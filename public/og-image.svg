<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'DM Sans', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a27" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Accent glow -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="#c084fc" opacity="0.04"/>

  <!-- Wheat emoji area -->
  <text x="600" y="200" text-anchor="middle" font-size="72" opacity="0.9">&#x1F33E;</text>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" fill="#e4e4ed" font-size="64" font-weight="700" letter-spacing="-1">Inbox Harvest</text>

  <!-- Tagline -->
  <text x="600" y="345" text-anchor="middle" fill="#8888a0" font-size="24" font-weight="400">Extract fan emails from your Facebook DMs in seconds.</text>

  <!-- Feature pills -->
  <rect x="260" y="390" width="140" height="34" rx="17" fill="#c084fc" opacity="0.12"/>
  <text x="330" y="412" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="500">100% Local</text>

  <rect x="420" y="390" width="150" height="34" rx="17" fill="#c084fc" opacity="0.12"/>
  <text x="495" y="412" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="500">Open Source</text>

  <rect x="590" y="390" width="150" height="34" rx="17" fill="#c084fc" opacity="0.12"/>
  <text x="665" y="412" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="500">No Backend</text>

  <rect x="760" y="390" width="170" height="34" rx="17" fill="#c084fc" opacity="0.12"/>
  <text x="845" y="412" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="500">CSV / JSON Export</text>

  <!-- Stat cards preview -->
  <rect x="140" y="470" width="210" height="80" rx="12" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="165" y="500" fill="#8888a0" font-size="12">Unique Emails</text>
  <text x="165" y="532" fill="#e4e4ed" font-size="28" font-weight="600">847</text>

  <rect x="370" y="470" width="210" height="80" rx="12" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="395" y="500" fill="#8888a0" font-size="12">Conversations</text>
  <text x="395" y="532" fill="#e4e4ed" font-size="28" font-weight="600">1,203</text>

  <rect x="600" y="470" width="210" height="80" rx="12" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="625" y="500" fill="#8888a0" font-size="12">Total Found</text>
  <text x="625" y="532" fill="#e4e4ed" font-size="28" font-weight="600">912</text>

  <rect x="830" y="470" width="210" height="80" rx="12" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="855" y="500" fill="#8888a0" font-size="12">Duplicates Merged</text>
  <text x="855" y="532" fill="#e4e4ed" font-size="28" font-weight="600">65</text>

  <!-- Privacy badge -->
  <text x="600" y="600" text-anchor="middle" fill="#8888a0" font-size="13" opacity="0.7">&#x1F512; All data stays in your browser</text>
</svg>
